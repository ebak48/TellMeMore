      ]}
    ]
  }
};

function computePath(answers, mode) {
  const pos = ['A','B'], neg = ['C','D'];
  const q1 = QUESTIONS[mode].section1;
  const s1sig = pos.includes(answers.s1) ? 'pos' : 'neg';
  const s2sig = pos.includes(answers.s2) ? 'pos' : 'neg';
  const s3sig = pos.includes(answers.s3) ? 'pos' : 'neg';
  if (s1sig === 'neg') return 'B';
  const posCount = [s1sig,s2sig,s3sig].filter(s=>s==='pos').length;
  if (posCount >= 2) return 'A';
  return 'B';
}

function buildQuestionQueue(mode, path) {
  const q = QUESTIONS[mode];
  return [
    ...q.section1,
    ...q.section2_fixed,
    ...(path === 'A' ? q.section2_pathA : q.section2_pathB),
    ...q.section3
  ];
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  const s = state.screen;
  if (s === 'landing')          app.appendChild(renderLanding());
  else if (s === 'create')      app.appendChild(renderCreate());
  else if (s === 'owner_wait')  app.appendChild(renderOwnerWait());
  else if (s === 'respond_loading') loadResponderProfile();
  else if (s === 'respond_mode')    app.appendChild(renderRespondMode());
  else if (s === 'questions')       app.appendChild(renderQuestions());
  else if (s === 'submitted')       app.appendChild(renderSubmitted());
  else if (s === 'results')         app.appendChild(renderResults());
  if (state.toast) {
    const t = el('div','toast',state.toast);
    app.appendChild(t);
    setTimeout(()=>{state.toast=null;render();},2500);
  }
}

function el(tag,cls,text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text) e.textContent = text;
  return e;
}

  const h = el('h2',''); h.textContent = 'Your first name';
  const sub = el('p',''); sub.style.cssText='color:var(--t2);font-size:12px;margin:8px 0 24px';
  sub.textContent = 'This is what your respondents will see.';
  const inp = el('input','input'); inp.type='text'; inp.placeholder='First name...'; inp.maxLength=30;
  if (state.profileName) inp.value = state.profileName;

  const modeLabel = el('p',''); modeLabel.style.cssText='font-size:12px;color:var(--t2);margin:24px 0 8px';
  modeLabel.textContent = 'What do you want to discover?';
  const cards = el('div','mode-cards');
  const modes = [
    { id:'friends', icon:'', label:'Friends', sub:'Social perception' },
    { id:'romance', icon:'',  label:'Romance', sub:'Romantic perception' }
  ];
  let selectedMode = state.mode || null;
  modes.forEach(m => {
    const c = el('div','mode-card' + (selectedMode===m.id?' selected':''));
    const lb = el('div','mode-card-label',m.label);
    const sb = el('div','mode-card-sub',m.sub);
    c.append(lb,sb);
    c.onclick = ()=>{ selectedMode=m.id; cards.querySelectorAll('.mode-card').forEach(x=>x.classList.remove('selected')); c.classList.add('selected'); };
    cards.appendChild(c);
  });

  const btn = el('button','btn','Continue');
  btn.style.marginTop='28px';

    btn.textContent='Creating...'; btn.disabled=true;

    state.profileId=res.id; state.profileSlug=res.slug; state.profileName=res.name; state.mode=res.mode;
    state.screen='owner_wait'; render();
  };
  wrap.append(ey,h,sub,inp,modeLabel,cards,btn);
  d.appendChild(wrap);
  return d;
}

function renderOwnerWait() {
  const d = el('div','screen');
  d.appendChild(bar());
  const wrap = el('div','wrap');
  wrap.style.paddingTop='36px';
  const ey = el('div','eyebrow','Your link is live');
  const h = el('h2',''); h.innerHTML = `${state.profileName}, <em>share your link</em>`;
  const sub = el('p',''); sub.style.cssText='color:var(--t2);font-size:12px;margin:8px 0 24px;line-height:1.6';
  sub.textContent = state.mode==='friends'
    ? `Share this link. People will answer about how they experience you socially.`
    : `Share this link. People will answer about how they experience you romantically.`;

  const linkBox = el('div','');
  linkBox.style.cssText='background:var(--bg2);border:1px solid var(--wire);border-radius:8px;padding:14px 16px;font-size:12px;color:var(--v3);letter-spacing:.02em;word-break:break-all;margin-bottom:12px;cursor:pointer';
  const link = `${location.origin}/r/${state.profileSlug}`;
  linkBox.textContent = link;
  linkBox.onclick = ()=>{ navigator.clipboard?.writeText(link); state.toast='Copied'; render(); };

  const btnCopy = el('button','btn','Copy link');
  btnCopy.onclick = ()=>{ navigator.clipboard?.writeText(link); state.toast='Copied'; render(); };

  const divider = el('div','divider');
  const countWrap = el('div','');
  countWrap.style.cssText='text-align:center;margin-bottom:20px';
  const countLabel = el('div','label','Responses');
  countLabel.style.marginBottom='8px';
  const countEl = el('div',''); countEl.style.cssText='font-size:32px;font-weight:500;color:var(--t0)';
  countEl.id='resp-count'; countEl.textContent='0';
  const patternMsg = el('div',''); patternMsg.id='pattern-msg';
  patternMsg.style.cssText='font-size:12px;color:var(--v3);margin-top:10px;min-height:18px;font-style:italic';
  countWrap.append(countLabel,countEl,patternMsg);

  const btnResults = el('button','btn','See what\'s emerging');
  btnResults.style.cssText='opacity:.35;cursor:not-allowed';
  btnResults.id='btn-results';
  btnResults.onclick = ()=>{ if(state.responseCount>=4){state.screen='results';render();}};

  wrap.append(ey,h,sub,linkBox,btnCopy,divider,countWrap,btnResults);
  d.appendChild(wrap);

  async function poll() {
    if (!state.profileId) return;
    const res = await api('GET',`/api/status/${state.profileId}`);
    if (!res) return;
    state.responseCount = res.responseCount||0;
    const elCount = document.getElementById('resp-count');
    const elPattern = document.getElementById('pattern-msg');
    const elBtn = document.getElementById('btn-results');
    if (elCount) elCount.textContent = state.responseCount;
    if (elPattern && res.patternMessage) elPattern.textContent = res.patternMessage;
    if (elBtn) {
      if(state.responseCount>=4){
        elBtn.style.opacity='1'; elBtn.style.cursor='pointer';
        elBtn.textContent = res.tier >= 2 ? 'View results' : "See what's emerging";
      } else {
        elBtn.style.opacity='.35'; elBtn.style.cursor='not-allowed';
      }
    }
  }
  poll();
  const pollInt = setInterval(()=>{ if(state.screen!=='owner_wait'){ clearInterval(pollInt); return; } poll(); },6000);
  return d;
}

function buildInitialQueue() {

// ГўвЂќв‚¬ГўвЂќв‚¬ Questions ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
function renderQuestions() {
  const questions = state.queuedQuestions;
  const idx = state.currentQ;
  const q = questions[idx];
  if (!q) { submitAnswers(); return el('div',''); }

  const totalExpected = 9;
  const progress = Math.round(((idx+1)/totalExpected)*100);

  const d = el('div','screen');
  d.appendChild(bar(`${idx+1} / ${totalExpected}`));

  const progressBar = el('div','progress-bar');
  const fill = el('div','progress-fill');
  fill.style.width=progress+'%';
  progressBar.appendChild(fill);
  d.appendChild(progressBar);

  const wrap = el('div','wrap');
  wrap.style.paddingTop='28px';

  const sectionNames = {1:'First Impression',2:'Deeper Read',3:'Gut Feeling'};
  const sTag = el('div','section-tag', `BГѓВ¶lГѓВјm ${q.section} Гўв‚¬вЂќ ${sectionNames[q.section]||''}`);
  wrap.appendChild(sTag);

  const qtext = el('div','question-text', q.text);
  wrap.appendChild(qtext);

  const selected = state.answers[q.id] || null;

  if (q.format === 'pair') {
    const pairWrap = el('div','pair-options');
    q.options.forEach(opt => {
      const o = el('div','pair-opt'+(selected===opt.key?' selected':''));
      const lb = el('div','pair-label','SeГѓВ§enek '+opt.key);
      const tx = el('div','pair-text',opt.text);
      o.append(lb,tx);
      o.onclick = ()=>{ state.answers[q.id]=opt.key; advance(); };
      pairWrap.appendChild(o);
    });
    wrap.appendChild(pairWrap);
  } else {
    const optWrap = el('div','options');
    q.options.forEach(opt => {
      const o = el('div','option'+(selected===opt.key?' selected':''));
      const k = el('div','option-key',opt.key);
      const t = el('div','option-text',opt.text);
      o.append(k,t);
      o.onclick = ()=>{ state.answers[q.id]=opt.key; advance(); };
      optWrap.appendChild(o);
    });
    wrap.appendChild(optWrap);
  }

  d.appendChild(wrap);
  return d;
}

async function advance() {
  const idx = state.currentQ;
  const questions = state.queuedQuestions;

  // After S3, compute path and inject adaptive questions
  if (idx === 2 && questions.length === 3) {
    const path = computePath(state.answers, state.mode);
    state.path = path;
    const q = QUESTIONS[state.mode];
    state.queuedQuestions = [
      ...q.section1,
      ...q.section2_fixed,
      ...(path === 'A' ? q.section2_pathA : q.section2_pathB),
      ...q.section3
    ];
  }

  state.currentQ = idx + 1;
  if (state.currentQ >= state.queuedQuestions.length) {
    await submitAnswers();
  } else {
    render();
  }
}

async function submitAnswers() {
  const profileId = state.respondProfile?.id;
  if (!profileId) { state.screen='submitted'; render(); return; }

  const d = document.getElementById('app');
  d.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-size:12px;color:var(--t3)">Kaydediliyor...</div>';

  const res = await api('POST','/api/responses',{ profileId, answers:state.answers });
  state.responseCount = res?.responseCount || 0;
  state.screen = 'submitted';
  render();
}

// ГўвЂќв‚¬ГўвЂќв‚¬ Results ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
function renderResults() {
  const d = el('div','screen');
  d.appendChild(bar('Results'));
  const wrap = el('div','wrap');
  wrap.style.paddingTop='28px';

  if (!state.results) {
    const loading = el('div','');
    loading.style.cssText='text-align:center;padding:60px 0;font-size:12px;color:var(--t3);font-style:italic';
    loading.textContent='Reading the signals...';
    wrap.appendChild(loading);
    d.appendChild(wrap);
    loadResults();
    return d;
  }

  const r = state.results;
  const ins = r.insight;
  const tier = r.tier || 1;
  const nextTier = r.nextTier;

  // Header
  const ey = el('div','eyebrow',`${r.profile.name} Гўв‚¬вЂќ ${r.profile.mode === 'friends' ? 'Friends' : 'Romance'}`);
  const h = el('h2','');
  h.innerHTML = `${r.responseCount} ${r.responseCount === 1 ? 'person' : 'people'} responded`;
  wrap.append(ey, h);

  // Unlock message
  if (r.unlockMessage) {
    const um = el('div','');
    um.style.cssText='font-size:13px;color:var(--v3);font-style:italic;margin:12px 0 20px;padding:12px 16px;background:rgba(139,92,246,.08);border-radius:6px;border-left:3px solid var(--v)';
    um.textContent = r.unlockMessage;
    wrap.appendChild(um);
  }

  // ГўвЂќв‚¬ГўвЂќв‚¬ TIER 1 Гўв‚¬вЂќ always shown ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
  if (ins.howPeopleSeeYou) {
    const b = el('div','result-block');
    b.append(el('div','result-block-label','How people experience you'), el('div','result-text',ins.howPeopleSeeYou));
    wrap.appendChild(b);
  }
  if (ins.yourSocialEnergy || ins.magneticText) {
    const b = el('div','result-block');
    b.append(el('div','result-block-label','Your energy'), el('div','result-text', ins.yourSocialEnergy || ins.magneticText));
    wrap.appendChild(b);
  }

  // ГўвЂќв‚¬ГўвЂќв‚¬ TIER 2 Гўв‚¬вЂќ unlocked at 8 ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
  if (tier >= 2) {
    if (ins.contradiction) {

      wrap.appendChild(cont);

      b.append(el('div','result-block-label','What you may not realize'), el('div','result-text', ins.whatYouDontRealize));

    // Locked tier 2 preview

    locked.style.cssText='background:var(--bg2);border:1px solid var(--wire);border-radius:8px;padding:20px 16px;text-align:center;margin:16px 0';
    const lk1 = el('div',''); lk1.style.cssText='font-size:11px;color:var(--t3);margin-bottom:6px';
    lk1.textContent = 'The Contradiction';
    const lk2 = el('div',''); lk2.style.cssText='font-size:13px;color:var(--t3);filter:blur(5px);user-select:none;line-height:1.5';
    lk2.textContent = 'People agree on something Гўв‚¬вЂќ and disagree on something else.';
    const lk3 = el('div',''); lk3.style.cssText='font-size:11px;color:var(--v2);margin-top:10px';
    lk3.textContent = nextTier ? `${nextTier.remaining} more response${nextTier.remaining===1?'':'s'} to unlock` : '';
    locked.append(lk1, lk2, lk3);
    wrap.appendChild(locked);
  }

  // ГўвЂќв‚¬ГўвЂќв‚¬ TIER 3 Гўв‚¬вЂќ unlocked at 12 ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
  if (tier >= 3) {
    if (ins.whatKeepsShowing) {
      const b = el('div','result-block');
      b.append(el('div','result-block-label','What keeps showing up'), el('div','result-text', ins.whatKeepsShowing));
      wrap.appendChild(b);
    }
    if (ins.frictionText) {
      const fr = el('div','friction-block');
      fr.append(el('div','friction-label','Only for you'), el('div','friction-text', ins.frictionText));
      wrap.appendChild(fr);
    }
    // Share card Гўв‚¬вЂќ only at full profile
    const card = el('div','share-card');
    const headline = ins.contradiction?.split('.')[0] || r.unlockMessage;
    card.append(
      el('div','share-name', r.profile.name),
      el('div','share-headline', headline),
      el('div','share-count', `${r.responseCount} people experienced this`),
      el('div','share-brand','TellMeMore')
    );
    wrap.appendChild(card);
    const btnShare = el('button','btn','Share result');
    btnShare.onclick = ()=>{
      const text = `${headline}\n\n${r.responseCount} people experienced this Гўв‚¬вЂќ TellMeMore`;
      if (navigator.share) navigator.share({ title:'TellMeMore', text, url: location.origin });
      else { navigator.clipboard?.writeText(text); state.toast='Copied'; render(); }
    };
    wrap.appendChild(btnShare);
  } else if (tier >= 2) {
    // Locked tier 3 preview
    const locked = el('div','');
    locked.style.cssText='background:var(--bg2);border:1px solid var(--wire);border-radius:8px;padding:20px 16px;text-align:center;margin:16px 0';
    const lk1 = el('div',''); lk1.style.cssText='font-size:11px;color:var(--t3);margin-bottom:6px';
    lk1.textContent = 'Full Profile';
    const lk2 = el('div',''); lk2.style.cssText='font-size:13px;color:var(--t3);filter:blur(5px);user-select:none';
    lk2.textContent = 'This is how you are experienced. All of it.';
    const lk3 = el('div',''); lk3.style.cssText='font-size:11px;color:var(--v2);margin-top:10px';
    lk3.textContent = nextTier ? `${nextTier.remaining} more to unlock the full profile` : '';
    locked.append(lk1, lk2, lk3);
    wrap.appendChild(locked);
  }

  // Progress toward next tier
  if (nextTier) {
    const prog = el('div','');
    prog.style.cssText='margin-top:24px;padding:14px 16px;background:var(--bg2);border:1px solid var(--wire);border-radius:8px';
    const progLabel = el('div',''); progLabel.style.cssText='font-size:11px;color:var(--t2);margin-bottom:8px';
    progLabel.textContent = `${nextTier.remaining} more response${nextTier.remaining===1?'':'s'} unlocks the ${nextTier.label}`;
    const bar = el('div','progress-bar');
    const fill = el('div','progress-fill');
    const pct = Math.round(((r.responseCount - (nextTier.threshold - (nextTier.threshold === 4 ? 4 : nextTier.threshold === 8 ? 4 : 4))) / (nextTier.threshold === 4 ? 4 : 4)) * 100);
    fill.style.width = Math.min(pct, 99) + '%';
    bar.appendChild(fill);
    const askBtn = el('button','btn btn-ghost'); askBtn.style.marginTop='12px';
    askBtn.textContent = 'Ask more people';
    askBtn.onclick = ()=>{ navigator.clipboard?.writeText(`${location.origin}/r/${state.profileSlug}`); state.toast='Responder link copied'; render(); };
    prog.append(progLabel, bar, askBtn);
    wrap.appendChild(prog);
  }

  d.appendChild(wrap);
  return d;
}

async function loadResults() {
  if (!state.profileId) return;
  const res = await api('GET',`/api/results/${state.profileId}`);
  if (!res || res.error) {
    state.toast = res?.error || 'Could not load results';
    state.screen = 'owner_wait';
    render();
    return;
  }
  state.results = res;
  render();
}

// ГўвЂќв‚¬ГўвЂќв‚¬ Init ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
render();
</script>
