<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,interactive-widget=resizes-content">
<meta name="theme-color" content="#0f0f13">
<title>TellMeMore — Perception Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap">
<style>
/* ── RESET + ROOT ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;--s1:#16151e;--s2:#1e1c2a;
  --border:#2a2840;--border2:#3d3a5a;
  --accent:#7c6af5;--accent2:#9b8cff;
  --text:#e8e6f0;--muted:#7a78a0;--dim:#4a4870;
  --green:#4ade80;--red:#f87171;--gold:#fbbf24;
  --radius:12px;--font:'DM Mono',ui-monospace,monospace;
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;overflow-x:hidden}

/* ── LAYOUT ── */
.screen{width:100%;max-width:480px;padding:2rem 1.25rem 4rem;min-height:100dvh;display:flex;flex-direction:column;gap:1.5rem}
.screen.center{justify-content:center;min-height:100dvh}

/* ── TYPOGRAPHY ── */
.h1{font-size:1.5rem;font-weight:500;line-height:1.3}
.h2{font-size:1.1rem;font-weight:500;line-height:1.4}
.body{font-size:.875rem;color:var(--muted);line-height:1.7}
.small{font-size:.75rem;color:var(--dim);line-height:1.6}
.label{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--dim)}
.accent{color:var(--accent)}

/* ── CARDS ── */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}

/* ── BUTTONS ── */
.btn{width:100%;padding:.875rem;border:none;border-radius:10px;font-family:var(--font);font-size:.9375rem;font-weight:500;cursor:pointer;transition:opacity .15s,transform .1s;letter-spacing:.02em;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.88}
.btn-secondary{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent);color:var(--text)}
.btn-ghost{background:transparent;color:var(--muted);border:none;padding:.5rem;font-size:.8rem}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ── INPUTS ── */
.input{width:100%;padding:.875rem 1rem;background:var(--s1);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:1rem;outline:none;transition:border-color .15s;-webkit-appearance:none}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:var(--dim)}
.input-group{display:flex;flex-direction:column;gap:.5rem}
.input-label{font-size:.75rem;color:var(--muted)}

/* ── OPTION CARDS (questions) ── */
.option{width:100%;padding:1rem;background:var(--s1);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:.875rem;line-height:1.5;cursor:pointer;text-align:left;transition:border-color .12s,background .12s;-webkit-tap-highlight-color:transparent;margin-bottom:.5rem}
.option:hover{border-color:var(--border2);background:var(--s2)}
.option.selected{border-color:var(--accent);background:#7c6af510}
.option:active{transform:scale(.99)}

/* ── PROGRESS ── */
.progress-bar{width:100%;height:2px;background:var(--s2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);transition:width .3s ease}
.progress-row{display:flex;justify-content:space-between;align-items:center}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:.35rem;padding:.3rem .65rem;border-radius:6px;font-size:.7rem;letter-spacing:.05em}
.badge-green{background:#4ade8015;color:var(--green);border:1px solid #4ade8030}
.badge-accent{background:#7c6af515;color:var(--accent2);border:1px solid #7c6af530}
.badge-muted{background:var(--s2);color:var(--muted);border:1px solid var(--border)}

/* ── UNLOCK TIERS ── */
.tier-row{display:flex;align-items:center;gap:.75rem;padding:.75rem 0;border-bottom:1px solid var(--border)}
.tier-row:last-child{border-bottom:none}
.tier-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.tier-icon.unlocked{background:#7c6af520;color:var(--accent)}
.tier-icon.locked{background:var(--s2);color:var(--dim)}
.tier-icon.next{background:#fbbf2415;color:var(--gold);border:1px solid #fbbf2430}
.tier-text{flex:1}
.tier-name{font-size:.8rem;font-weight:500}
.tier-sub{font-size:.7rem;color:var(--muted);margin-top:.15rem}

/* ── SIGNAL BARS ── */
.signal-row{margin-bottom:.875rem}
.signal-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.35rem}
.signal-name{font-size:.8rem;font-weight:500}
.signal-track{height:6px;background:var(--s2);border-radius:3px;overflow:hidden}
.signal-fill{height:100%;border-radius:3px;transition:width .6s ease}
.signal-fill.pos{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.signal-fill.neg{background:linear-gradient(90deg,#f8717140,var(--red))}

/* ── ANON NOTICE ── */
.anon-notice{display:flex;align-items:flex-start;gap:.625rem;padding:.75rem 1rem;background:#4ade8008;border:1px solid #4ade8025;border-radius:8px}
.anon-notice-icon{color:var(--green);font-size:.9rem;flex-shrink:0;margin-top:.1rem}
.anon-notice-text{font-size:.78rem;color:var(--muted);line-height:1.5}

/* ── SPINNER ── */
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:1rem auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LOGO MARK ── */
.logomark{font-size:1.4rem;color:var(--accent);letter-spacing:-.02em;font-weight:500}

/* ── MODE CHOICE ── */
.mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:.875rem}
.mode-card{padding:1.25rem 1rem;background:var(--s1);border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;text-align:center;transition:border-color .15s,background .15s;-webkit-tap-highlight-color:transparent}
.mode-card:hover{border-color:var(--border2)}
.mode-card.selected{border-color:var(--accent);background:#7c6af510}
.mode-card-icon{font-size:1.5rem;margin-bottom:.5rem}
.mode-card-name{font-size:.875rem;font-weight:500;margin-bottom:.25rem}
.mode-card-desc{font-size:.7rem;color:var(--muted)}

/* ── SHARE LINK BOX ── */
.link-box{display:flex;align-items:center;gap:.75rem;padding:.875rem 1rem;background:var(--s2);border:1px solid var(--border);border-radius:10px}
.link-text{flex:1;font-size:.8rem;color:var(--muted);word-break:break-all;line-height:1.4}
.link-copy{flex-shrink:0;padding:.5rem .875rem;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:var(--font);font-size:.75rem;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.link-copy.copied{background:var(--green);color:#000}

/* ── RESULT CARD ── */
.result-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:.75rem}
.result-card-head{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:.5rem}
.result-card-body{font-size:.875rem;line-height:1.7;color:var(--text)}

/* ── LOCKED RESULT CARD ── */
.result-locked{background:var(--s1);border:1px dashed var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:.75rem;opacity:.4;filter:blur(1px);pointer-events:none;user-select:none}

/* ── SIGNAL TEASER (first_signals state) ── */
.signal-teaser{text-align:center;padding:2rem 1rem}
.signal-teaser-name{font-size:2rem;font-weight:200;letter-spacing:.1em;color:var(--accent);opacity:.5;margin-bottom:.75rem}
.signal-teaser-sub{font-size:.8rem;color:var(--dim);letter-spacing:.05em}

/* ── TOAST ── */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--s1);border:1px solid var(--border2);border-radius:8px;padding:.65rem 1.25rem;font-size:.8rem;color:var(--text);white-space:nowrap;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}

/* ── MAGIC LINK BOX ── */
.magic-box{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:1rem;word-break:break-all;font-size:.78rem;color:var(--accent2);line-height:1.5}

/* ── STEP INDICATOR ── */
.steps{display:flex;gap:.375rem;align-items:center}
.step-dot{width:6px;height:6px;border-radius:50%;background:var(--dim);transition:background .2s,width .2s}
.step-dot.active{background:var(--accent);width:18px;border-radius:3px}
.step-dot.done{background:var(--border2)}

/* ── BACK BTN ── */
.back-btn{display:flex;align-items:center;gap:.375rem;background:none;border:none;color:var(--dim);font-family:var(--font);font-size:.8rem;cursor:pointer;padding:0;-webkit-tap-highlight-color:transparent}
.back-btn:hover{color:var(--muted)}
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- APP ROOT -->
<div id="app"></div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
// LD-04: MVP modes are 'friends' and 'dating' only.
const S = {
  screen:       'landing',
  mode:         null,        // 'friends' | 'dating'   (LD-04)
  name:         '',
  email:        '',
  profileId:    null,
  slug:         null,
  shareId:      null,
  shareUrl:     null,
  respondUrl:   null,
  sessionId:    getOrCreateSessionId(),
  questions:    [],          // 7 questions from server (LD-06)
  qIndex:       0,
  answers:      {},
  optionalNote: '',          // LD-06: 1 optional short answer
  respondingTo: null,
  refProfileId: null,
  src:          null,
  result:       null,
  authChecked:  false,
  userId:       null,
  magicUrl:     null,
  language:     detectLang()
};

function getOrCreateSessionId() {
  try {
    let sid = sessionStorage.getItem('tmm_sid');
    if (!sid) { sid = hex(16); sessionStorage.setItem('tmm_sid', sid); }
    return sid;
  } catch { return hex(16); }
}

function detectLang() {
  return (navigator.language || 'en').slice(0, 2);
}

function hex(n) {
  const a = new Uint8Array(n);
  crypto.getRandomValues(a);
  return Array.from(a).map(x => x.toString(16).padStart(2,'0')).join('');
}

// ─── ROUTING ─────────────────────────────────────────────────────────────────
function boot() {
  const path = location.pathname;

  if (path.startsWith('/r/')) {
    const slug = path.slice(3);
    if (slug === 'results') { checkSessionThenShowResults(); return; }
    loadProfileForResponder(slug);
    return;
  }

  const params = new URLSearchParams(location.search);
  if (params.get('auth') === 'expired') { S.screen = 'return_expired'; render(); return; }

  checkSessionSilently(() => { S.screen = 'landing'; render(); });
}

function checkSessionSilently(cb) {
  apiFetch('/api/me').then(d => {
    if (d && d.userId) {
      S.userId    = d.userId;
      S.profileId = d.profileId;
      if (d.profile) {
        S.slug    = d.profile.slug;
        S.shareId = d.profile.share_id;
        S.name    = d.profile.name;
        S.mode    = d.profile.mode;
        S.shareUrl = `${location.origin}/s/${d.profile.share_id}`;
      }
    }
    S.authChecked = true; cb();
  }).catch(() => { S.authChecked = true; cb(); });
}

function checkSessionThenShowResults() {
  apiFetch('/api/me').then(d => {
    if (d && d.userId && d.profileId) {
      S.userId = d.userId; S.profileId = d.profileId;
      if (d.profile) { S.name = d.profile.name; S.mode = d.profile.mode; }
      S.screen = 'results_loading'; render(); loadResults();
    } else { S.screen = 'return_email'; render(); }
  }).catch(() => { S.screen = 'return_email'; render(); });
}

async function loadProfileForResponder(slug) {
  S.screen = 'loading'; render();
  const params = new URLSearchParams(location.search);
  S.refProfileId = params.get('ref') || null;
  S.src = params.get('src') || detectSrc();

  const data = await apiFetch(`/api/profile/${encodeURIComponent(slug)}`).catch(() => null);
  if (!data || !data.profile) { S.screen = 'not_found'; render(); return; }

  S.respondingTo = data.profile;
  S.questions = data.questions || [];
  S.qIndex = 0;
  S.answers = {};
  S.optionalNote = '';
  S.screen = 'respond_intro'; render();
  trackEvent('responder_started', { profileId: data.profile.id });
}

function detectSrc() {
  const ua = navigator.userAgent;
  if (/FBAN|FBAV|Instagram/.test(ua)) return 'instagram';
  if (/WhatsApp/.test(ua)) return 'whatsapp';
  if (/Telegram/.test(ua)) return 'telegram';
  return 'web';
}

// ─── API ─────────────────────────────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    credentials: 'same-origin', ...opts
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({ error: 'Request failed' }));
    throw new Error(e.error || 'Request failed');
  }
  return res.json();
}

async function trackEvent(event, extra = {}) {
  apiFetch('/api/track', {
    method: 'POST',
    body: JSON.stringify({
      event,
      profileId: S.profileId || (S.respondingTo && S.respondingTo.id) || null,
      sessionId: S.sessionId,
      userId:    S.userId,
      language:  S.language,
      platform:  detectSrc(),
      ...extra
    })
  }).catch(() => {});
}

// ─── CLIPBOARD / SHARE ───────────────────────────────────────────────────────
async function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    try { await navigator.clipboard.writeText(text); return true; } catch {}
  }
  try {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta); return ok;
  } catch { return false; }
}

async function shareOrCopy(url) {
  if (navigator.share) {
    try {
      await navigator.share({ title:'TellMeMore', text:'How do you see me? Answer anonymously →', url });
      return 'shared';
    } catch (e) { if (e.name === 'AbortError') return 'cancelled'; }
  }
  return (await copyText(url)) ? 'copied' : 'failed';
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function toast(msg, dur = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

// ─── SANITIZE ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
// v4.1 BUG1 FIX: track whether delegated handleClick is already attached to #app.
// Without this, each render() stacks a new listener → N taps fires handleClick N times.
let _clickBound = false;

function render() {
  const app = document.getElementById('app');
  const screens = {
    landing:           renderLanding,
    create_mode:       renderCreateMode,
    create_name:       renderCreateName,
    create_email:      renderCreateEmail,
    create_link:       renderCreateLink,
    return_email:      renderReturnEmail,
    return_sent:       renderReturnSent,
    return_expired:    renderReturnExpired,
    respond_intro:     renderRespondIntro,
    respond_questions: renderRespondQuestions,
    respond_optional:  renderRespondOptional,
    respond_done:      renderRespondDone,
    results_loading:   renderResultsLoading,
    results:           renderResults,
    loading:           renderLoading,
    not_found:         renderNotFound
  };
  const fn = screens[S.screen];
  app.innerHTML = fn ? fn() : '<div class="screen center"><p class="body">Unknown screen.</p></div>';
  bindEvents();
}

// ── LANDING ──────────────────────────────────────────────────────────────────
function renderLanding() {
  const hasSession = !!S.userId;
  return `
<div class="screen center" style="gap:2rem;padding-top:3rem">
  <div>
    <div class="logomark" style="margin-bottom:.5rem">TellMeMore</div>
    <div class="small">perception intelligence</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:.75rem">
    <p class="h1">Find out how<br>people actually see you.</p>
    <p class="body">Share a link. Friends answer anonymously.<br>You unlock their honest perception of you.</p>
  </div>
  <div style="display:flex;flex-direction:column;gap:.625rem;width:100%">
    <button class="btn btn-primary" data-action="start-create">Get started</button>
    ${hasSession
      ? `<button class="btn btn-secondary" data-action="go-results">View my results</button>`
      : `<button class="btn btn-secondary" data-action="go-return">Return to my results</button>`}
  </div>
  <p class="small" style="text-align:center">
    <a href="/privacy" style="color:var(--dim);text-decoration:none">Privacy</a>
    &nbsp;&middot;&nbsp;
    <a href="/terms" style="color:var(--dim);text-decoration:none">Terms</a>
  </p>
</div>`;
}

// ── CREATE FLOW ───────────────────────────────────────────────────────────────
// LD-04: Mode options are 'friends' and 'dating' only.
function renderCreateMode() {
  return `
<div class="screen">
  <div style="display:flex;align-items:center;justify-content:space-between">
    <button class="back-btn" data-action="back-landing">&#8592; Back</button>
    <div class="steps">
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
    </div>
  </div>
  <p class="h2">Who will you share with?</p>
  <p class="body">Choose the type of perception you want to explore.</p>
  <div class="mode-cards">
    <div class="mode-card ${S.mode==='friends'?'selected':''}" data-mode="friends">
      <div class="mode-card-icon">&#x25C8;</div>
      <div class="mode-card-name">Social</div>
      <div class="mode-card-desc">How people in your life see you</div>
    </div>
    <div class="mode-card ${S.mode==='dating'?'selected':''}" data-mode="dating">
      <div class="mode-card-icon">&#x25C7;</div>
      <div class="mode-card-name">Dating</div>
      <div class="mode-card-desc">How you come across in intimate contexts</div>
    </div>
  </div>
  <button class="btn btn-primary" id="btn-mode-next" ${!S.mode?'disabled':''} data-action="mode-next">Continue</button>
</div>`;
}

function renderCreateName() {
  return `
<div class="screen">
  <div style="display:flex;align-items:center;justify-content:space-between">
    <button class="back-btn" data-action="back-mode">&#8592; Back</button>
    <div class="steps">
      <div class="step-dot done"></div>
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
    </div>
  </div>
  <p class="h2">What is your first name?</p>
  <p class="body">This is what responders will see. Use your real first name.</p>
  <div class="input-group">
    <label class="input-label" for="inp-name">First name</label>
    <input id="inp-name" class="input" type="text" placeholder="e.g. Alex" maxlength="60" autocomplete="given-name" value="${esc(S.name)}">
  </div>
  <button class="btn btn-primary" data-action="name-next">Continue</button>
</div>`;
}

function renderCreateEmail() {
  return `
<div class="screen">
  <div style="display:flex;align-items:center;justify-content:space-between">
    <button class="back-btn" data-action="back-name">&#8592; Back</button>
    <div class="steps">
      <div class="step-dot done"></div>
      <div class="step-dot done"></div>
      <div class="step-dot active"></div>
    </div>
  </div>
  <p class="h2">Where do we send your results link?</p>
  <p class="body">Your email lets you return to your results from any device. We do not send marketing email.</p>
  <div class="input-group">
    <label class="input-label" for="inp-email">Email address</label>
    <input id="inp-email" class="input" type="email" placeholder="you@example.com" maxlength="200" autocomplete="email" value="${esc(S.email)}">
  </div>
  <div class="anon-notice">
    <div class="anon-notice-icon">&#x2713;</div>
    <div class="anon-notice-text">Your responders never see your email. We only use it for account recovery.</div>
  </div>
  <p class="small">You must be at least 16 years old to create a profile.</p>
  <button class="btn btn-primary" id="btn-email-next" data-action="email-next">Create my profile</button>
</div>`;
}

function renderCreateLink() {
  const url = S.shareUrl || '';
  return `
<div class="screen">
  <div class="badge badge-green" style="align-self:flex-start">&#x2714; Profile created</div>
  <p class="h1">Share your link,<br>get honest answers.</p>
  <p class="body">Send this to friends or anyone you want perception from. They answer in 90 seconds, anonymously.</p>

  <div class="card" style="gap:.75rem;display:flex;flex-direction:column">
    <div class="label">Your share link</div>
    <div class="link-box">
      <div class="link-text">${esc(url)}</div>
      <button class="link-copy" id="btn-copy-link" data-action="copy-link">Copy</button>
    </div>
    <button class="btn btn-primary" data-action="share-link" style="margin-top:.25rem">&#x2197; Share link</button>
  </div>

  <div class="card">
    <div class="label" style="margin-bottom:.75rem">How unlocking works</div>
    ${renderUnlockTiers(0)}
  </div>

  <button class="btn btn-secondary" data-action="go-results">View my results</button>
</div>`;
}

// ── RETURN FLOW ───────────────────────────────────────────────────────────────
function renderReturnEmail() {
  return `
<div class="screen center">
  <button class="back-btn" data-action="back-landing">&#8592; Back</button>
  <div style="height:1rem"></div>
  <p class="h2">Return to your results</p>
  <p class="body">Enter the email you used when creating your profile.</p>
  <div class="input-group" style="margin-top:.5rem">
    <label class="input-label" for="inp-return-email">Email address</label>
    <input id="inp-return-email" class="input" type="email" placeholder="you@example.com" autocomplete="email">
  </div>
  <button class="btn btn-primary" id="btn-send-magic" data-action="send-magic" style="margin-top:.25rem">Send my link</button>
  <p id="return-error" class="small" style="color:var(--red);min-height:1rem"></p>
</div>`;
}

function renderReturnSent() {
  return `
<div class="screen center" style="gap:1.25rem">
  <div class="badge badge-green">&#x2714; Link sent</div>
  <p class="h2">Check your inbox</p>
  <p class="body">We sent a login link to <strong>${esc(S.email)}</strong>. Click it to return to your results.</p>
  ${S.magicUrl ? `
  <div class="card" style="gap:.5rem;display:flex;flex-direction:column">
    <div class="label">Alpha mode &#x2014; copy this link manually</div>
    <div class="magic-box">${esc(S.magicUrl)}</div>
    <button class="btn btn-secondary" data-action="copy-magic">Copy link</button>
  </div>` : ''}
  <p class="small" style="text-align:center">No email? Check spam, or try again.</p>
  <button class="btn btn-ghost" data-action="back-return">Try a different email</button>
</div>`;
}

function renderReturnExpired() {
  return `
<div class="screen center" style="gap:1rem">
  <p class="h2">Link expired</p>
  <p class="body">Magic links expire after 24 hours. Request a new one below.</p>
  <button class="btn btn-primary" data-action="go-return">Get a new link</button>
</div>`;
}

// ── RESPOND FLOW ──────────────────────────────────────────────────────────────
function renderRespondIntro() {
  if (!S.respondingTo) return renderNotFound();
  const name = esc(S.respondingTo.name);
  // LD-04: mode labels — 'dating' shows as 'dating perception', 'friends' shows as 'social perception'
  const modeLabel = S.respondingTo.mode === 'dating' ? 'dating perception' : 'social perception';
  const qCount = S.questions.length || 7;
  return `
<div class="screen center" style="gap:1.5rem">
  <div style="text-align:center">
    <div style="width:64px;height:64px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:500;color:#fff;margin:0 auto 1rem">${esc(S.respondingTo.name.charAt(0).toUpperCase())}</div>
    <p class="label" style="margin-bottom:.5rem">${esc(modeLabel)}</p>
    <p class="h1">${name} wants to know<br>how you see them</p>
  </div>
  <div class="anon-notice">
    <div class="anon-notice-icon">&#x2713;</div>
    <div class="anon-notice-text">Your answers are shown without your name. We do not reveal who submitted them.</div>
  </div>
  <p class="body" style="text-align:center">
    ${qCount} questions &middot; about 90 seconds.<br>Be honest &#x2014; they only see patterns, not your individual answers.
  </p>
  <button class="btn btn-primary" data-action="start-questions">Start answering</button>
  <a href="/" style="font-size:.78rem;color:var(--dim);text-decoration:none">Create your own profile &#x2192;</a>
</div>`;
}

function renderRespondQuestions() {
  const q = S.questions[S.qIndex];
  if (!q) { showOptionalStep(); return '<div class="screen center"><div class="spinner"></div></div>'; }
  const pct = ((S.qIndex) / S.questions.length * 100).toFixed(0);
  const sel = S.answers[q.id];

  return `
<div class="screen" style="padding-bottom:1.5rem">
  <div>
    <div class="progress-row" style="margin-bottom:.5rem">
      <span class="small">${S.qIndex + 1} of ${S.questions.length}</span>
      <span class="small">${pct}%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>
  <p class="h2" style="margin-top:.5rem">${esc(q.text)}</p>
  <div id="options-list">
    ${q.options.map(o => `
    <button class="option ${sel === o.id ? 'selected' : ''}" data-option="${esc(o.id)}" data-qid="${esc(q.id)}">
      ${esc(o.text)}
    </button>`).join('')}
  </div>
  <div class="anon-notice" style="margin-top:auto">
    <div class="anon-notice-icon">&#x2713;</div>
    <div class="anon-notice-text">Your identity is never revealed. ${esc(S.respondingTo.name)} only sees patterns across all responses.</div>
  </div>
</div>`;
}

// LD-06: Optional short-answer field after 7 structured questions
// v4.2 P3: client-side guard — require 6/7 answered before allowing submission.
// Server enforces the same rule independently.
function renderRespondOptional() {
  const answeredCount = Object.keys(S.answers).length;
  const meetsThreshold = answeredCount >= 6;
  const missing = 6 - answeredCount;
  return `
<div class="screen" style="padding-bottom:1.5rem">
  <div>
    <div class="progress-row" style="margin-bottom:.5rem">
      <span class="small">Optional</span>
      <span class="small">100%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:100%"></div></div>
  </div>
  <p class="h2">One more thing</p>
  <p class="body">Is there anything you would want ${esc(S.respondingTo ? S.respondingTo.name : 'them')} to know? This is optional and anonymous.</p>
  <textarea id="inp-optional" class="input" style="resize:none;height:120px;line-height:1.6" maxlength="300" placeholder="Optional — leave blank to skip...">${esc(S.optionalNote)}</textarea>
  <p class="small" style="text-align:right" id="char-count">0 / 300</p>
  ${!meetsThreshold ? `<p class="small" style="color:var(--red);text-align:center">Please go back and answer ${missing} more question${missing!==1?'s':''}.</p>
  <button class="btn btn-secondary" data-action="go-back-questions">&#8592; Back to questions</button>` : `
  <button class="btn btn-primary" data-action="submit-response">Submit answers</button>
  <button class="btn btn-ghost" data-action="submit-response">Skip and submit</button>`}
</div>`;
}

function renderRespondDone() {
  return `
<div class="screen center" style="gap:1.5rem">
  <div class="badge badge-green">&#x2714; Done</div>
  <p class="h1">Thank you for<br>answering honestly.</p>
  <p class="body">${S.respondingTo ? `${esc(S.respondingTo.name)} will see` : 'They will see'} your answers as part of their perception profile &#x2014; never linked to you.</p>
  <div class="card" style="text-align:center">
    <p class="body" style="margin-bottom:1rem">Curious how people see you?</p>
    <a href="/" class="btn btn-primary" style="text-decoration:none;display:block;padding:.875rem;border-radius:10px;text-align:center">Create my own profile &#x2192;</a>
  </div>
  <p class="small" style="text-align:center;color:var(--dim)">
    <a href="/privacy" style="color:var(--dim);text-decoration:none">Privacy policy</a>
  </p>
</div>`;
}

// ── RESULTS ───────────────────────────────────────────────────────────────────
// LD-05: 4 states: locked (0) / first_signals (1-2) / emerging (3-4) / unlocked (5+)
function renderResultsLoading() {
  return `<div class="screen center"><div class="spinner"></div><p class="small" style="text-align:center;margin-top:.5rem">Loading your results...</p></div>`;
}

function renderResults() {
  if (!S.result) return renderResultsLoading();
  const r = S.result;
  const n = r.responseCount;
  const tier = r.tier; // locked | first_signals | emerging | unlocked
  const name = esc(S.name || 'Your');
  const url  = S.shareUrl || '';

  const tierLabels = {
    locked:        'Waiting for responses',
    first_signals: 'Something is forming',
    emerging:      'Emerging signal',
    unlocked:      'Full result unlocked'
  };

  const nextUnlock = r.nextUnlock;
  const nextMessage = nextUnlock
    ? `${nextUnlock - n} more response${nextUnlock - n !== 1 ? 's' : ''} to unlock the next layer`
    : null;

  return `
<div class="screen">
  <div style="display:flex;align-items:center;justify-content:space-between">
    <div class="logomark" style="font-size:1rem">TellMeMore</div>
    <button class="btn-ghost" data-action="logout" style="font-size:.75rem">Sign out</button>
  </div>

  <div>
    <p class="label" style="margin-bottom:.375rem">${name}'s perception profile</p>
    <p class="h2">${esc(tierLabels[tier] || 'Results')}</p>
    <p class="small" style="margin-top:.25rem">${n} response${n !== 1 ? 's' : ''} received</p>
  </div>

  <!-- Unlock progress (LD-05) -->
  <div class="card">
    <div class="label" style="margin-bottom:.75rem">Unlock progress</div>
    ${renderUnlockTiers(n)}
    ${nextMessage
      ? `<p class="small" style="margin-top:.75rem;text-align:center">${esc(nextMessage)}</p>`
      : '<p class="small" style="margin-top:.75rem;text-align:center;color:var(--green)">&#x2714; Full result unlocked.</p>'}
  </div>

  <!-- Share / re-share CTA -->
  <div class="card">
    <div class="label" style="margin-bottom:.375rem">Share to unlock more</div>
    ${nextMessage
      ? `<p class="small" style="margin-bottom:.75rem;color:var(--muted)">${esc(nextMessage)}.</p>`
      : '<p class="small" style="margin-bottom:.75rem;color:var(--green)">All layers unlocked. Share to keep your profile growing.</p>'}
    <div class="link-box">
      <div class="link-text">${esc(url)}</div>
      <button class="link-copy" id="btn-copy-results" data-action="copy-link">Copy</button>
    </div>
    <button class="btn btn-primary" data-action="share-link" style="margin-top:.75rem">&#x2197; Share for more responses</button>
  </div>

  <!-- Tier: locked — no responses yet -->
  ${tier === 'locked' ? `
  <div class="card" style="text-align:center;gap:.75rem;display:flex;flex-direction:column">
    <p class="body">No responses yet.</p>
    <p class="small">Share your link above to get your first result.</p>
  </div>` : ''}

  <!-- Tier: first_signals — 1-2 responses — show primary signal name as teaser -->
  ${tier === 'first_signals' && r.primary ? `
  <div class="result-card">
    <div class="result-card-head">Something keeps showing up.</div>
    <div class="signal-teaser">
      <div class="signal-teaser-name">${esc(r.primary.label)}</div>
      <div class="signal-teaser-sub">Get ${r.nextUnlock - n} more response${r.nextUnlock - n !== 1 ? 's' : ''} to reveal what this means.</div>
    </div>
  </div>` : ''}

  <!-- Tier: emerging — 3-4 responses — show primary signal fully -->
  ${tier === 'emerging' && r.primary ? `
  <div class="result-card">
    <div class="result-card-head">Primary signal</div>
    <div class="label" style="color:var(--accent);margin-bottom:.375rem">${esc(r.primary.label)}</div>
    <div class="result-card-body">${esc(r.primary.text)}</div>
    ${renderSignalBar(r.primary.score)}
  </div>
  <div class="result-locked">
    <div class="result-card-head">Locked</div>
    <div class="result-card-body" style="filter:blur(3px)">&#x25A0;&#x25A0;&#x25A0;&#x25A0;&#x25A0;&#x25A0;&#x25A0;&#x25A0;&#x25A0;&#x25A0;&#x25A0;&#x25A0;</div>
  </div>` : ''}

  <!-- Tier: unlocked — 5+ responses — full result -->
  ${tier === 'unlocked' ? `
  ${r.primary ? `
  <div class="result-card">
    <div class="result-card-head">Primary signal</div>
    <div class="label" style="color:var(--accent);margin-bottom:.375rem">${esc(r.primary.label)}</div>
    <div class="result-card-body">${esc(r.primary.text)}</div>
    ${renderSignalBar(r.primary.score)}
  </div>` : ''}
  ${r.secondary ? `
  <div class="result-card">
    <div class="result-card-head">Secondary signal</div>
    <div class="label" style="color:var(--accent);margin-bottom:.375rem">${esc(r.secondary.label)}</div>
    <div class="result-card-body">${esc(r.secondary.text)}</div>
    ${renderSignalBar(r.secondary.score)}
  </div>` : ''}
  ${r.tertiary ? `
  <div class="result-card">
    <div class="result-card-head">Third signal</div>
    <div class="label" style="color:var(--accent);margin-bottom:.375rem">${esc(r.tertiary.label)}</div>
    <div class="result-card-body">${esc(r.tertiary.text)}</div>
    ${renderSignalBar(r.tertiary.score)}
  </div>` : ''}
  ${r.blindSpot ? `
  <div class="result-card" style="border-color:#f8717130">
    <div class="result-card-head">Blind spot &#x2014; what you likely underestimate about your own impact</div>
    <div class="label" style="color:var(--red);margin-bottom:.375rem">${esc(r.blindSpot.label)}</div>
    <div class="result-card-body">${esc(r.blindSpot.text)}</div>
    ${renderSignalBar(r.blindSpot.score)}
  </div>` : ''}
  ` : ''}

  <p class="small" style="text-align:center;color:var(--dim)">
    <a href="/privacy" style="color:var(--dim);text-decoration:none">Privacy</a>
    &nbsp;&middot;&nbsp;
    <a href="/terms" style="color:var(--dim);text-decoration:none">Terms</a>
  </p>
</div>`;
}

function renderSignalBar(score) {
  const pct = Math.round(Math.abs(score || 0) * 100);
  const pos = (score || 0) >= 0;
  return `
<div class="signal-row" style="margin-top:.75rem">
  <div class="signal-header">
    <span class="signal-name">${pos ? '+' : '−'} ${pct}% signal strength</span>
  </div>
  <div class="signal-track">
    <div class="signal-fill ${pos ? 'pos' : 'neg'}" style="width:${pct}%"></div>
  </div>
</div>`;
}

// LD-05: 3 unlock tiers (first_signals / emerging / unlocked)
function renderUnlockTiers(responseCount) {
  const tiers = [
    { n: 1, label: '1–2 responses — First Signals',   sub: 'Primary signal name revealed' },
    { n: 3, label: '3–4 responses — Emerging Signal', sub: 'Primary signal fully revealed' },
    { n: 5, label: '5+ responses — Unlocked',              sub: 'All signals + blind spot' }
  ];
  return tiers.map((t, i) => {
    const done = responseCount >= t.n;
    const next = !done && (i === 0 || responseCount >= tiers[i-1].n);
    const cls  = done ? 'unlocked' : next ? 'next' : 'locked';
    const icon = done ? '&#x2714;' : next ? '&#x25CF;' : '&#x25A1;';
    return `<div class="tier-row">
      <div class="tier-icon ${cls}">${icon}</div>
      <div class="tier-text">
        <div class="tier-name">${t.label}</div>
        <div class="tier-sub">${t.sub}</div>
      </div>
    </div>`;
  }).join('');
}

function renderLoading() {
  return `<div class="screen center"><div class="spinner"></div></div>`;
}

function renderNotFound() {
  return `<div class="screen center" style="gap:1rem"><p class="h2">Profile not found.</p><a href="/" class="btn btn-secondary" style="text-decoration:none;display:block;text-align:center">Go home</a></div>`;
}

// ─── EVENT BINDING ────────────────────────────────────────────────────────────
function bindEvents() {
  // v4.1 BUG1 FIX: Only attach delegated handleClick once.
  // render() is called on every state change — without this guard, listeners stack
  // and a single click fires handleClick N times (N = number of renders so far).
  // This is especially critical in the responder flow (7 renders for 7 questions).
  if (!_clickBound) {
    document.getElementById('app').addEventListener('click', handleClick);
    _clickBound = true;
  }

  document.querySelectorAll('[data-mode]').forEach(el => {
    el.addEventListener('click', () => { S.mode = el.dataset.mode; render(); });
  });

  document.querySelectorAll('[data-option]').forEach(el => {
    el.addEventListener('click', () => selectOption(el.dataset.qid, el.dataset.option));
  });

  // Optional textarea char count
  const optInp = document.getElementById('inp-optional');
  const charCount = document.getElementById('char-count');
  if (optInp && charCount) {
    optInp.addEventListener('input', () => {
      S.optionalNote = optInp.value;
      charCount.textContent = `${optInp.value.length} / 300`;
    });
  }
}

function handleClick(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;

  switch (action) {
    case 'start-create':  S.screen = 'create_mode'; render(); break;
    case 'back-landing':  S.screen = 'landing';      render(); break;
    case 'back-mode':     S.screen = 'create_mode';  render(); break;
    case 'back-name':     S.screen = 'create_name';  render(); break;
    case 'back-return':   S.screen = 'return_email'; render(); break;
    case 'go-return':     S.screen = 'return_email'; render(); break;

    case 'mode-next':
      if (S.mode) { S.screen = 'create_name'; render(); }
      break;

    case 'name-next': {
      const inp = document.getElementById('inp-name');
      const val = (inp ? inp.value : '').trim();
      if (val.length < 2) { toast('Please enter your first name.'); return; }
      S.name = val; S.screen = 'create_email'; render();
      break;
    }

    case 'email-next':
      handleCreateProfile();
      break;

    case 'send-magic':
      handleSendMagic();
      break;

    case 'copy-magic':
      if (S.magicUrl) copyText(S.magicUrl).then(() => toast('Link copied!'));
      break;

    case 'start-questions':
      S.screen = 'respond_questions'; render();
      break;

    // v4.2 P3: back from optional screen if <6 questions answered
    case 'go-back-questions':
      S.qIndex = Math.max(0, S.questions.length - 1);
      S.screen = 'respond_questions'; render();
      break;

    case 'submit-response':
      submitResponse();
      break;

    case 'go-results':
      if (S.profileId) { S.screen = 'results_loading'; render(); loadResults(); }
      else             { S.screen = 'return_email';    render(); }
      break;

    case 'copy-link': {
      const url = S.shareUrl || '';
      copyText(url).then(ok => {
        if (ok) {
          toast('Link copied!');
          const btn = document.getElementById('btn-copy-link') || document.getElementById('btn-copy-results');
          if (btn) { btn.textContent = 'Copied!'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000); }
        } else { toast('Copy failed — select the link manually.'); }
      });
      break;
    }

    case 'share-link': {
      const url = S.shareUrl || '';
      const onResults = S.screen === 'results';
      trackEvent(onResults ? 'share_after_result' : 'share_clicked');
      shareOrCopy(url).then(result => {
        if (result === 'copied') toast('Link copied!');
        else if (result === 'failed') toast('Could not share — copy the link instead.');
      });
      break;
    }

    case 'logout':
      apiFetch('/api/auth/logout', { method: 'DELETE' }).finally(() => {
        S.userId = null; S.profileId = null; S.result = null;
        S.screen = 'landing'; render();
      });
      break;
  }
}

// v4.1 BUG3 FIX: guard against double-trigger during the 280ms advance delay.
// Without this, rapid taps or compounded listener stacking can call selectOption
// twice for the same question, incrementing qIndex by 2 and skipping a question.
let _selectLocked = false;

function selectOption(qid, optId) {
  if (_selectLocked) return;
  _selectLocked = true;

  S.answers[qid] = optId;
  trackEvent('question_answered', { metadata: { q: qid, a: optId } });

  setTimeout(() => {
    _selectLocked = false;
    S.qIndex++;
    if (S.qIndex >= S.questions.length) {
      S.screen = 'respond_optional'; render();
    } else {
      render();
    }
  }, 280);
}

function showOptionalStep() {
  S.screen = 'respond_optional'; render();
}

// ─── API ACTIONS ──────────────────────────────────────────────────────────────
async function handleCreateProfile() {
  const inp = document.getElementById('inp-email');
  const email = (inp ? inp.value : '').trim().toLowerCase();
  if (!email || !email.includes('@')) { toast('Please enter a valid email address.'); return; }

  const btn = document.getElementById('btn-email-next');
  if (btn) { btn.disabled = true; btn.textContent = 'Creating...'; }

  S.email = email;
  try {
    const data = await apiFetch('/api/profile', {
      method: 'POST',
      body: JSON.stringify({ name: S.name, mode: S.mode, email: S.email, language: S.language })
    });
    S.profileId  = data.profileId;
    S.slug       = data.slug;
    S.shareId    = data.shareId;
    S.shareUrl   = data.shareUrl;
    S.respondUrl = data.respondUrl;
    if (S.refProfileId) {
      apiFetch('/api/referral/convert', {
        method: 'POST',
        body: JSON.stringify({ sessionId: S.sessionId, invitedProfileId: data.profileId })
      }).catch(() => {});
    }
    S.screen = 'create_link'; render();
  } catch (e) {
    toast(e.message || 'Could not create profile. Try again.');
    if (btn) { btn.disabled = false; btn.textContent = 'Create my profile'; }
  }
}

async function handleSendMagic() {
  const inp = document.getElementById('inp-return-email');
  const email = (inp ? inp.value : '').trim().toLowerCase();
  const errEl = document.getElementById('return-error');

  if (!email || !email.includes('@')) {
    if (errEl) errEl.textContent = 'Please enter a valid email.';
    return;
  }

  const btn = document.getElementById('btn-send-magic');
  if (btn) { btn.disabled = true; btn.textContent = 'Sending...'; }

  S.email = email;
  try {
    const data = await apiFetch('/api/auth/email', {
      method: 'POST',
      body: JSON.stringify({ email })
    });
    S.magicUrl = data.magicUrl || null;
    S.screen = 'return_sent'; render();
  } catch (e) {
    if (errEl) errEl.textContent = e.message || 'Could not send link. Try again.';
    if (btn) { btn.disabled = false; btn.textContent = 'Send my link'; }
  }
}

async function submitResponse() {
  S.screen = 'loading'; render();

  // LD-06: include optional note if provided
  const metadata = S.optionalNote && S.optionalNote.trim()
    ? { optional_note: S.optionalNote.trim().slice(0, 300) }
    : null;

  try {
    await apiFetch('/api/responses', {
      method: 'POST',
      body: JSON.stringify({
        profileId:    S.respondingTo.id,
        sessionId:    S.sessionId,
        answers:      S.answers,
        refProfileId: S.refProfileId,
        src:          S.src,
        language:     S.language,
        metadata
      })
    });
    S.screen = 'respond_done'; render();
  } catch (e) {
    toast(e.message || 'Could not submit. Please try again.');
    S.screen = 'respond_optional'; render();
  }
}

async function loadResults() {
  try {
    const data = await apiFetch(`/api/results/${S.profileId}`);
    S.result = data.result;
    if (data.profile) {
      S.name    = data.profile.name;
      S.shareId = data.profile.shareId;
      S.shareUrl = `${location.origin}/s/${data.profile.shareId}`;
    }
    S.screen = 'results'; render();
  } catch (e) {
    toast(e.message || 'Could not load results.');
    S.screen = 'landing'; render();
  }
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
boot();
</script>
</body>
</html>
