<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="tm-api" content="http://localhost:3000/api"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>TellMeMore</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0B0A0A;--bg1:#121110;--bg2:#191816;--bg3:#201E1C;--bg4:#282624;
  --wire:#302E2C;--wire2:#403E3C;
  --t0:#F3F3F2;--t1:#D8D2CB;--t2:#AAA49C;--t3:#807870;--t4:#585250;
  --pos:#2D8055;--pos2:#58D898;
  --cau:#A07020;--cau2:#D4A030;
  --neg:#902828;--neg2:#E05858;
  --brand:#8B5CF6;--brand2:#A78BFA;--brand3:#C4B5FD;
  --warm:#CC9060;--warm2:#DFA870;
  --serif:'Libre Baskerville',Georgia,serif;
  --ui:'Inter',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono','Courier New',monospace;
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{background:var(--bg0);color:var(--t1);font-family:var(--ui);min-height:100vh;min-height:100dvh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;right:0;height:1px;background:var(--wire);z-index:100}
body::after{content:'';position:fixed;top:-30%;left:-15%;width:80vw;height:80vw;background:radial-gradient(circle,rgba(139,92,246,.05) 0%,transparent 65%);pointer-events:none;z-index:-1}

/* ANIMATIONS */
.screen{animation:screenUp .3s cubic-bezier(.16,1,.3,1) both}
@keyframes screenUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.75)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes revealUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 20px rgba(139,92,246,.25)}50%{box-shadow:0 0 35px rgba(139,92,246,.45)}}
@keyframes counterTick{0%{transform:translateY(4px);opacity:0}100%{transform:translateY(0);opacity:1}}

.reveal-block{animation:revealUp .55s cubic-bezier(.16,1,.3,1) both}
.reveal-1{animation-delay:.08s}.reveal-2{animation-delay:.2s}.reveal-3{animation-delay:.34s}
.reveal-4{animation-delay:.48s}.reveal-5{animation-delay:.62s}.reveal-6{animation-delay:.76s}

/* LAYOUT */
.wrap{max-width:720px;margin:0 auto;padding:0 20px}
.wrap-w{max-width:960px;margin:0 auto;padding:0 20px}

/* BAR */
.bar{padding:18px 24px;border-bottom:1px solid var(--wire);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(11,10,10,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:50}
.logo{display:flex;align-items:center;gap:9px;font-size:10px;font-weight:600;letter-spacing:.32em;text-transform:uppercase;color:var(--t0);font-family:var(--mono)}
.logo-dot{width:6px;height:6px;background:var(--brand);border-radius:1px;box-shadow:0 0 8px rgba(139,92,246,.6)}
.bar-r{font-size:9px;color:var(--t3);letter-spacing:.22em;text-transform:uppercase;font-family:var(--mono)}

/* TYPE */
.d1{font-family:var(--serif);font-size:clamp(36px,6vw,68px);line-height:.95;letter-spacing:-.02em;color:var(--t0);font-weight:700}
.d1 em{font-style:italic;font-weight:400;color:var(--brand2)}
.d2{font-family:var(--serif);font-size:clamp(22px,4vw,38px);line-height:1.05;color:var(--t0);font-weight:700;letter-spacing:-.01em}
.d2 em{font-style:italic;font-weight:400}
.d3{font-family:var(--serif);font-size:clamp(18px,2.5vw,22px);font-weight:400;color:var(--t0);line-height:1.3}
.eyebrow{font-size:9px;font-weight:600;letter-spacing:.4em;text-transform:uppercase;color:var(--t3);margin-bottom:10px;font-family:var(--mono)}
.body{font-size:14px;color:var(--t2);line-height:1.8}
.body-b{color:var(--t1);font-weight:500}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--wire);padding:22px;margin-bottom:12px;position:relative}
.card-v{border-color:rgba(139,92,246,.25);background:linear-gradient(135deg,rgba(139,92,246,.04) 0%,var(--bg2) 100%)}
.c-lbl{font-size:9px;letter-spacing:.35em;text-transform:uppercase;color:var(--t3);margin-bottom:14px;font-family:var(--mono)}

/* INPUTS */
.inp{width:100%;background:var(--bg1);border:1px solid var(--wire);color:var(--t0);padding:14px 16px;font-family:var(--ui);font-size:15px;outline:none;transition:border-color .18s,box-shadow .18s;-webkit-appearance:none;border-radius:0}
.inp:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(139,92,246,.12)}
.inp::placeholder{color:var(--t4)}
.lbl{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--t3);display:block;margin-bottom:8px;font-family:var(--mono)}
.f{margin-bottom:20px}

/* BUTTONS */
.btn{font-family:var(--ui);font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:16px 28px;cursor:pointer;border:none;transition:all .18s;min-height:52px;-webkit-appearance:none;border-radius:0}
.btn-p{background:var(--brand);color:#F3F3F2;box-shadow:0 0 20px rgba(139,92,246,.3),0 2px 8px rgba(0,0,0,.5)}
.btn-p:hover{background:var(--brand2);box-shadow:0 0 32px rgba(139,92,246,.45),0 4px 12px rgba(0,0,0,.5);transform:translateY(-1px)}
.btn-p:active{transform:translateY(0)}
.btn-p:disabled{opacity:.22;cursor:not-allowed;box-shadow:none;transform:none}
.btn-g{background:transparent;color:var(--t2);border:1px solid var(--wire2)}
.btn-g:hover{border-color:var(--brand);color:var(--brand3);box-shadow:0 0 12px rgba(139,92,246,.15)}
.btn-full{width:100%;display:block}

/* CTX TABS */
.ctx-row{display:flex;border:1px solid var(--wire);overflow:hidden}
.ctx-b{flex:1;padding:13px 0;text-align:center;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--t3);cursor:pointer;background:var(--bg1);border:none;border-right:1px solid var(--wire);transition:all .15s;font-family:var(--mono);min-height:46px}
.ctx-b:last-child{border-right:none}
.ctx-b.on{background:rgba(139,92,246,.15);color:var(--brand3);font-weight:600;border-bottom:2px solid var(--brand)}
.ctx-b:not(.on):hover{color:var(--t1);background:var(--bg3)}

/* PROGRESS */
.prog-wrap{margin-bottom:36px}
.prog-meta{display:flex;justify-content:space-between;margin-bottom:8px}
.prog-track{height:2px;background:var(--wire);border-radius:2px;overflow:hidden}
.prog-fill{height:2px;background:linear-gradient(90deg,var(--brand),var(--brand2));transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 6px rgba(139,92,246,.5);border-radius:2px}

/* SCALE */
.q-block{margin-bottom:28px}
.q-text-main{font-size:15px;color:var(--t0);margin-bottom:14px;line-height:1.6;font-family:var(--ui)}
.sc-row{display:flex;gap:4px}
.sc-b{flex:1;padding:15px 0;text-align:center;background:var(--bg2);border:1px solid var(--wire);color:var(--t3);font-family:var(--mono);font-size:14px;cursor:pointer;transition:all .12s;min-height:52px}
.sc-b:hover{border-color:var(--wire2);color:var(--t1);background:var(--bg3)}
.sc-b.on{background:rgba(139,92,246,.15);border-color:var(--brand);color:var(--brand3);font-weight:600;box-shadow:inset 0 0 0 1px rgba(139,92,246,.3)}
.sc-ends{display:flex;justify-content:space-between;margin-top:7px}
.sc-end{font-size:9px;color:var(--t4);letter-spacing:.08em;font-family:var(--mono)}

/* YES/NO */
.yn-row{display:flex;gap:8px}
.yn-b{flex:1;padding:16px 0;background:var(--bg2);border:1px solid var(--wire);color:var(--t3);font-family:var(--ui);font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .12s;min-height:52px}
.yn-b:hover{border-color:var(--wire2);color:var(--t1)}
.yn-b.y{background:rgba(61,153,112,.1);border-color:var(--pos2);color:var(--pos2)}
.yn-b.n{background:rgba(224,88,88,.1);border-color:var(--neg2);color:var(--neg2)}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px}
.chip{padding:10px 16px;background:var(--bg2);border:1px solid var(--wire);color:var(--t2);font-family:var(--mono);font-size:11px;letter-spacing:.06em;cursor:pointer;transition:all .12s;user-select:none;min-height:42px;display:flex;align-items:center}
.chip:hover{border-color:var(--wire2);color:var(--t1)}
.chip.on{background:rgba(139,92,246,.12);border-color:var(--brand);color:var(--brand3)}

/* TEXTAREA */
.ta{width:100%;background:var(--bg1);border:1px solid var(--wire);color:var(--t0);padding:14px 16px;font-family:var(--ui);font-size:14px;outline:none;resize:none;height:80px;transition:border-color .18s,box-shadow .18s;-webkit-appearance:none;border-radius:0}
.ta:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(139,92,246,.12)}

/* SECTION DIVIDER */
.sec{display:flex;align-items:center;gap:14px;margin:32px 0 24px}
.sec-line{flex:1;height:1px;background:var(--wire)}
.sec-lbl{font-size:9px;letter-spacing:.35em;color:var(--t3);text-transform:uppercase;font-family:var(--mono);white-space:nowrap}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;font-size:9px;letter-spacing:.14em;text-transform:uppercase;margin-right:6px;margin-bottom:6px;font-family:var(--mono)}
.b-pos{background:rgba(88,216,152,.08);border:1px solid rgba(88,216,152,.3);color:var(--pos2);font-weight:500}
.b-cau{background:rgba(212,160,48,.07);border:1px solid rgba(212,160,48,.28);color:var(--cau2)}
.b-neg{background:rgba(224,88,88,.07);border:1px solid rgba(224,88,88,.28);color:var(--neg2)}
.b-neu{background:rgba(139,92,246,.07);border:1px solid rgba(139,92,246,.22);color:var(--brand2)}

/* SAFETY */
.safety{padding:12px 16px;border:1px solid var(--wire);background:var(--bg3);margin-bottom:22px;display:flex;gap:10px;align-items:flex-start}
.safety-t{font-size:11px;color:var(--t2);line-height:1.75}

/* SIGNAL BLOCKS */
.sig{padding:12px 16px;border-left:2px solid;margin-bottom:8px}
.sig-pos{border-left-color:var(--pos2);background:rgba(88,216,152,.04)}
.sig-cau{border-left-color:var(--cau2);background:rgba(212,160,48,.04)}
.sig-neg{border-left-color:var(--neg2);background:rgba(224,88,88,.04)}

/* RESULT PANELS */
.results{padding:40px 0 80px}
.pt-panel{padding:28px;margin-bottom:2px;overflow:hidden;position:relative}
.pt-name{font-family:var(--serif);font-size:clamp(24px,4vw,38px);font-weight:700;line-height:1;margin-bottom:10px;color:var(--t0)}
.pt-line{font-size:13px;opacity:.75;line-height:1.65;max-width:520px;font-family:var(--ui)}
.pt-bullets{list-style:none;margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(0,0,0,.3)}
.pt-bullet{background:rgba(0,0,0,.25);padding:14px 16px}
.pt-bullet-k{font-size:8px;letter-spacing:.3em;text-transform:uppercase;margin-bottom:5px;opacity:.55;font-family:var(--mono)}
.pt-bullet-v{font-size:11px;line-height:1.55;font-family:var(--ui)}

/* TRAIT BARS */
.trow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--wire)}
.trow:last-child{border-bottom:none}
.t-name{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--t1);width:120px;flex-shrink:0;font-family:var(--mono)}
.t-track{flex:1;height:4px;background:var(--wire);position:relative;overflow:hidden}
.t-self{position:absolute;top:0;height:4px;background:var(--wire2);transition:width 1s ease}
.t-other{position:absolute;top:0;height:4px;background:var(--t0);transition:width 1s ease .1s}
.t-pct{font-size:11px;color:var(--t2);width:32px;text-align:right;flex-shrink:0;font-family:var(--mono)}
.t-delta{font-size:10px;width:38px;text-align:right;flex-shrink:0;font-weight:600;font-family:var(--mono)}

/* ACTION PLAN */
.action-item{display:flex;gap:12px;padding:16px 0;border-bottom:1px solid var(--wire)}
.action-item:last-child{border-bottom:none}
.action-type{font-size:8px;letter-spacing:.28em;text-transform:uppercase;width:80px;flex-shrink:0;padding-top:2px;font-family:var(--mono)}
.action-text{font-size:13px;color:var(--t1);line-height:1.65;flex:1;font-family:var(--ui)}

/* TRUST / HESITATION */
.th-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--wire);align-items:flex-start}
.th-item:last-child{border-bottom:none}
.th-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;margin-top:7px}
.th-text{font-size:13px;color:var(--t1);line-height:1.5;font-family:var(--ui)}

/* SCORE GRID */
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--wire);border:1px solid var(--wire);margin-bottom:8px}
.sc-cell{background:var(--bg2);padding:18px}
.sc-lbl{font-size:8px;letter-spacing:.28em;text-transform:uppercase;color:var(--t3);margin-bottom:10px;font-family:var(--mono)}
.sc-tag{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);margin-bottom:3px;font-family:var(--mono)}
.sc-val{font-family:var(--serif);font-size:30px;line-height:1}
.sc-self{color:var(--t2)}.sc-other{color:var(--t0)}
.sc-pos{color:var(--pos2)}.sc-neg{color:var(--neg2)}.sc-neu{color:var(--cau2)}
.sc-track{height:2px;background:var(--wire);margin-top:5px}
.sc-fill{height:2px;transition:width 1.2s ease}

/* PLY ROWS */
.ply-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--wire)}
.ply-row:last-child{border-bottom:none}
.ply-m{font-size:9px;letter-spacing:.18em;text-transform:uppercase;flex-shrink:0;padding-top:1px;width:72px;font-family:var(--mono)}
.ply-t{font-size:12px;color:var(--t1);line-height:1.6;flex:1;font-family:var(--ui)}

/* MOBILE */
@media(max-width:660px){
  .bar{padding:16px 18px}
  .wrap,.wrap-w{padding:0 16px}
  .sgrid{grid-template-columns:1fr}
  .pt-bullets{grid-template-columns:1fr}
  .landing-grid{grid-template-columns:1fr !important}
  .landing-l,.landing-r{padding:40px 20px !important}
  .landing-l{border-right:none !important;border-bottom:1px solid var(--wire)}
  .d1{font-size:clamp(34px,8vw,52px)}
}
@media(max-width:768px){
  .landing-grid{grid-template-columns:1fr}
  .landing-l{border-right:none;border-bottom:1px solid var(--wire)}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════

const CONTEXTS = ["Friends","Dating / Relationship"];

const QUESTION_BANK = {
"Friends-Balanced":{
  baseline:[
    {id:"b1",text:"When you talk to them, do you feel they are actually listening — or just waiting to respond?",lo:"Just waiting",hi:"Actually listening"},

},

    {id:"b2",text:"When they say they'll be there, does the doubt disappear — or stay?",lo:"Doubt stays",hi:"Doubt gone"},
    {id:"b3",text:"After a conflict, do you end up closer or more guarded?",lo:"More guarded",hi:"Closer"},
    {id:"b4",text:"When you're vulnerable, do they meet you there — or step back?",lo:"Step back",hi:"Always meet me there"},
    {id:"b5",text:"In conflict, do they own their part — or position you as the problem?",lo:"Always my fault",hi:"Always owns theirs"},
  ],
  high_signal:[
    {id:"h1",text:"If a real crisis hit, would you trust them to stay — not just show up initially?"},
    {id:"h2",text:"Would you choose them again knowing everything you know now?"},

  forced_choice:[
    {id:"f1",optionA:"Consistent but emotionally cold",optionB:"Warm but unpredictable"},
    {id:"f2",optionA:"Devoted but controlling",optionB:"Free but unavailable"},

  traits:["Trustworthy","Present","Honest","Loyal","Emotionally available","Consistent","Vulnerable","Warm","Controlling","Intimidating","Inconsistent","Emotionally distant"],
  blind_spot:"What do they do in the relationship that creates distance — even without meaning to?",
},

function getQ(){
  const key = state.context + "-Balanced";
  return QUESTION_BANK[key] || QUESTION_BANK["Friends-Balanced"];
}

// Profile types — full data
const PROFILE_TYPES = {
  TRUSTED_HARD:{
    name:"Trusted but Hard to Read",
    line:"People trust your judgment and presence, but may not always feel emotionally close to you.",
    insightA:"People trust you under pressure.",
    insightB:"They don't always feel emotionally close to you.",
    bg:"#0f1210",border:"rgba(88,216,152,.22)",
    strength:"High trust under pressure. People rely on you.",
    risk:"Emotional distance that others feel but never say.",
    blindspot:"Your care is real. It doesn't always land.",
    correction:"Say the thing you think people already know.",
    trustFor:["Showing up under pressure","Saying what you mean","Protecting people you care about"],
    hesitateAbout:["Opening up emotionally","Depending on small follow-throughs","Challenging you directly"],
    ply:{succeed:"building genuine trust through consistent, quiet delivery",fail:"claiming the room they have already earned",misunderstand:"that others are ready to follow them before they feel ready to lead"},
  },
  QUIETLY_RESPECTED:{

    line:"Others rate you higher than you rate yourself. You may be under-claiming your actual impact.",
    insightA:"People already give you more credibility than you give yourself.",
    insightB:"You may be waiting for permission you already have.",
    bg:"#0f1210",border:"rgba(88,216,152,.22)",
    strength:"Credibility others already give you — often unused.",
    risk:"Self-doubt keeps you operating below your actual trust level.",
    blindspot:"Internal narrative is below external perception.",
    correction:"Stop self-qualifying. Operate at the level others already see.",
    trustFor:["Consistent delivery","Quiet reliability","Thoughtful judgment"],
    hesitateAbout:["Voicing your perspective","Claiming credit","Leading without invitation"],
    ply:{succeed:"building trust through consistency",fail:"claiming the room they have earned",misunderstand:"that others follow before they feel ready to lead"},
  },
};

// Share styles
const SHARE_STYLES = {
  clean:{
    label:"Clean",
    cardLine1:"People trust me under pressure.",
    cardLine2:"They don't always feel emotionally close to me.",
    caption:"Asked 8 people how they experience me.\nThis was the pattern.\nWhat would yours say?\ntellmemore.app",
  },
  brutal:{
    label:"Brutal",
    cardLine1:"Reliable, apparently.",
    cardLine2:"Emotionally readable, not so much.",
    caption:"8 people answered anonymously.\nApparently I'm trusted but hard to read.\nRude. Useful. Probably true.\ntellmemore.app",
  },
  funny:{
    label:"Funny",
    cardLine1:"People trust me.",
    cardLine2:"They just need a manual to reach me emotionally.",
    caption:"I asked 8 people how they experience me.\nThe results were organized disrespect.\nWhat would yours say?\ntellmemore.app",

  mysterious:{
    label:"Mysterious",
    cardLine1:"8 people answered.",
    cardLine2:"My profile unlocked: Trusted but Hard to Read",
    caption:"8 people answered.\nI needed a minute.\nAsk 8 people. Meet yourself.\ntellmemore.app",

};

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════

const state = {
  screen:"landing",
  name:"",
  context:"Friends",
  selfTraits:[],
  selfBeh:{},
  selfDec:{},
  mode:null,
  respBeh:{},
  respDec:{},
  respTraits:[],
  respFC:{},
  respBlind1:"",
  responseCount:3,
  resultsRevealed:false,
  shareStyle:"clean",
  liveTimer:null,
};

function resetResponderState(){
  state.respBeh={};state.respDec={};state.respTraits=[];state.respFC={};state.respBlind1="";
}
function resetAll(){
  if(state.liveTimer){clearInterval(state.liveTimer);state.liveTimer=null;}
  Object.assign(state,{

function render(keepScroll){
  const root = document.getElementById('app');
  root.innerHTML = "";
  let node;
  switch(state.screen){
    case "landing":    node=Landing(); break;
    case "self-t":     node=SelfTraits(); break;
    case "self-b":     node=SelfBehavioral(); break;
    case "self-d":     node=SelfDecisions(); break;
    case "owner":      node=OwnerWait(); break;
    case "form-b":     node=FormBehavioral(); break;
    case "form-d":     node=FormDecisions(); break;
    case "form-fc":    node=FormForcedChoice(); break;
    case "form-t":     node=FormTraits(); break;
    case "form-blind": node=FormBlindSpot(); break;
    case "submitted":  node=Submitted(); break;
    case "results":    node=Results(); break;
    case "sample":     node=SampleResult(); break;
    default:           node=Landing();
  }
  root.appendChild(node);
  if(!keepScroll) window.scrollTo({top:0,behavior:'instant'});
}

// HELPERS
// ═══════════════════════════════════════════════════════

function el(tag, props, ...children){
  const e = document.createElement(tag);
  if(props){
    for(const k in props){
      if(k==='style') Object.assign(e.style,props[k]);
      else if(k==='class') e.className=props[k];
      else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),props[k]);
      else if(k==='html') e.innerHTML=props[k];
      else e.setAttribute(k,props[k]);
    }
  }
  for(const c of children){
    if(c==null) continue;
    if(typeof c==='string') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}

function mkBar(right){
  return el('div',{class:'bar'},
    el('div',{class:'logo'},el('div',{class:'logo-dot'}),'TellMeMore'),
    right?el('div',{class:'bar-r'},right):null
  );
}

function backBtn(toScreen){
  const b=el('button',{class:'btn btn-g',style:{marginBottom:'28px',fontSize:'9px',padding:'10px 18px',display:'inline-flex',alignItems:'center',gap:'6px',minHeight:'38px'}},'← Back');
  b.onclick=()=>{state.screen=toScreen;render()};
  return b;
}

function progressBar(step,total){
  return el('div',{class:'prog-wrap'},
    el('div',{class:'prog-meta'},
      el('span',{style:{fontSize:'9px',color:'var(--t3)',letterSpacing:'.3em',textTransform:'uppercase',fontFamily:'var(--mono)'}},step.label),
      el('span',{style:{fontSize:'9px',color:'var(--t2)',letterSpacing:'.2em',fontFamily:'var(--mono)'}},step.n+'/'+total)
    ),
    el('div',{class:'prog-track'},el('div',{class:'prog-fill',style:{width:(step.n/total*100)+'%'}}))
  );
}

function ScaleQ(q,value,onChange){
  const block=el('div',{class:'q-block'});
  block.appendChild(el('p',{class:'q-text-main'},q.text));
  const row=el('div',{class:'sc-row'});
  for(let n=1;n<=5;n++){
    const b=el('button',{class:'sc-b'+(value===n?' on':'')},String(n));
    b.onclick=()=>onChange(n);
    row.appendChild(b);
  }
  block.appendChild(row);
  block.appendChild(el('div',{class:'sc-ends'},
    el('span',{class:'sc-end'},q.lo),
    el('span',{class:'sc-end'},q.hi)
  ));
  return block;
}

function clipCopy(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    return navigator.clipboard.writeText(text);
  }
  return new Promise((res)=>{
    const ta=document.createElement('textarea');
    ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);res();
  });
}

  }

  // Live counter simulation
  if(state.liveTimer) clearInterval(state.liveTimer);
  if(n<12){

    })()
  ));

}

// ================================================================
// BACKEND API INTEGRATION
// ================================================================

async function apiCall(method, path, data) {
  try {
    const base = window.TELLMEMORE_API || '';
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (data) opts.body = JSON.stringify(data);
    const r = await fetch(base + path, opts);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  } catch (e) {
    console.warn('[API]', method, path, e.message);
    return null;
  }
}

// Override OwnerWait to persist profile & poll live count
const _origOwnerWait = OwnerWait;
function OwnerWait() {
  // Persist profile to backend on first visit
  if (!state.profileId && state.name && state.selfBeh) {
    apiCall('POST', '/api/profiles', {
      name: state.name,
      context: state.context,
      selfTraits: state.selfTraits,
      selfBeh: state.selfBeh,
      selfDec: state.selfDec,
    }).then(data => {
      if (data && data.id) {
        state.profileId = data.id;
        state.profileSlug = data.slug;
        state.shareLink = data.link;
      }
    });
  }

  // Poll live response count every 8s
  if (!state._pollTimer && state.profileId) {
    state._pollTimer = setInterval(() => {
      apiCall('GET', '/api/status/' + state.profileId).then(d => {
        if (d && d.responseCount !== undefined && d.responseCount !== state.responseCount) {
          state.responseCount = d.responseCount;
          if (state.screen === 'owner') render(true);
        }
      });
    }, 8000);
  }

  return _origOwnerWait();
}

// Override FormBlindSpot submit to save to backend
const _origSubmitted = Submitted;
function Submitted() {
  // Save response to backend
  if (!state._responseSaved && state.profileId) {
    state._responseSaved = true;
    apiCall('POST', '/api/responses', {
      profileId: state.profileId,
      beh: state.respBeh,
      dec: state.respDec,
      traits: state.respTraits,
      forcedChoice: state.respFC,
      energy: state.respEnergy || '',
      blindSpot: state.respBlind1 || '',
    }).then(d => {
      if (d && d.responseCount !== undefined) {
        state.responseCount = d.responseCount;
      }
    });
  }
  return _origSubmitted();
}

// Override Results to load real data when available
const _origResults = Results;
function Results() {
  if (state.profileId && state.responseCount >= 8 && !state._resultsLoaded) {
    state._resultsLoaded = true;
    apiCall('GET', '/api/results/' + state.profileId).then(data => {
      if (data && data.responseCount) {
        state.responseCount = data.responseCount;
        state._liveResults = data;
        render();
      }
    });
  }
  return _origResults();
}

// Add energy selector to state
if (!state.respEnergy) state.respEnergy = '';

render();
